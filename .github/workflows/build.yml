name: Build Debug APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ubuntu-latest runners already ship with the Android SDK preinstalled
      # (ANDROID_HOME / ANDROID_SDK_ROOT are set and sdkmanager is on PATH).
      # We only need to make sure the specific platform/build-tools this
      # project targets are installed; no third-party setup action required.
      - name: Ensure required Android SDK packages are installed
        run: |
          SDK_ROOT="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          echo "Android SDK root: $SDK_ROOT"
          SDKMANAGER="$(find "$SDK_ROOT" -type f -name sdkmanager 2>/dev/null | sort -r | head -n1)"
          if [ -z "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager || true)"
          fi
          echo "Using sdkmanager at: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        id: build
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build-output.log

      - name: Save build log on failure (for diagnosis)
        if: steps.build.outcome == 'failure'
        run: |
          mkdir -p .ci
          cp build-output.log .ci/last-build-log.txt
          git config user.name "ci-log-bot"
          git config user.email "ci-log-bot@users.noreply.github.com"
          git add .ci/last-build-log.txt
          git commit -m "ci: record failing build log [skip ci]" || echo "nothing to commit"
          git push origin HEAD:ci-logs --force

      - name: Fail job if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Upload APK artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
