name: Build Debug APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ubuntu-latest runners already ship with the Android SDK preinstalled
      # (ANDROID_HOME / ANDROID_SDK_ROOT are set and sdkmanager is on PATH).
      # We only need to make sure the specific platform/build-tools this
      # project targets are installed; no third-party setup action required.
      - name: Ensure required Android SDK packages are installed
        run: |
          SDK_ROOT="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          echo "Android SDK root: $SDK_ROOT"
          SDKMANAGER="$(find "$SDK_ROOT" -type f -name sdkmanager 2>/dev/null | sort -r | head -n1)"
          if [ -z "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager || true)"
          fi
          echo "Using sdkmanager at: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
